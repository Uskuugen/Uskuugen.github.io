<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bubble Graph with React and Bootstrap</title>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- React -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!--React.js-->
    <script src="./assets/js/React/Component/ReactDataTable.js" type="text/babel"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .tooltip {
            position: absolute;
            text-align: center;
            padding: 5px;
            font-size: 12px;
            background: black;
            color: white;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="container mt-4">
        <h1 class="text-center">React + D3.js Bubble Graph</h1>
        <div id="react-data-table" class="mb-4"></div>
        <div id="my_dataviz"></div>
    </div>

    <script type="text/babel">
        const ReactDataTable = () => {
            return (
                <div>
                    <h2>React Table Component</h2>
                    <table className="table text-center table-striped">
                        <thead>
                            <tr>
                                <th>Country</th>
                                <th>Olympian</th>
                                <th>Sport</th>
                                <th>Type</th>
                                <th>Skilled</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>USA</td>
                                <td>Michael Phelps</td>
                                <td>Swimming</td>
                                <td>Summer</td>
                                <td>Yes</td>
                            </tr>
                            <tr>
                                <td>Jamaica</td>
                                <td>Usain Bolt</td>
                                <td>Sprinting</td>
                                <td>Summer</td>
                                <td>Yes</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById("react-data-table")).render(<ReactDataTable />);
    </script>

    <script>
        // Bubble graph
        var margin = { top: 20, right: 30, bottom: 50, left: 60 },
            width = 800 - margin.left - margin.right,
            height = 500 - margin.top - margin.bottom;

        var svg = d3.select("#my_dataviz")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

        var data = [
            { country: "USA", medals: 3000, population: 331000000, continent: "Americas" },
            { country: "China", medals: 2800, population: 1440000000, continent: "Asia" },
            { country: "Russia", medals: 2000, population: 146000000, continent: "Europe" },
            { country: "Jamaica", medals: 300, population: 3000000, continent: "Americas" },
            { country: "Australia", medals: 500, population: 25000000, continent: "Oceania" }
        ];

        var x = d3.scaleLinear().domain([0, 3000]).range([0, width]);
        svg.append("g")
            .attr("transform", "translate(0," + height + ")")
            .call(d3.axisBottom(x));

        var y = d3.scaleLinear().domain([0, 1500000000]).range([height, 0]);
        svg.append("g").call(d3.axisLeft(y));

        var z = d3.scaleSqrt().domain([0, 3000]).range([5, 40]);

        var myColor = d3.scaleOrdinal()
            .domain(["Asia", "Europe", "Americas", "Africa", "Oceania"])
            .range(d3.schemeSet2);

        svg.append('g')
            .selectAll("circle")
            .data(data)
            .enter()
            .append("circle")
            .attr("cx", d => x(d.medals))
            .attr("cy", d => y(d.population))
            .attr("r", d => z(d.medals))
            .style("fill", d => myColor(d.continent))
            .on("mouseover", (event, d) => {
                const tooltip = d3.select("body").append("div")
                    .attr("class", "tooltip")
                    .html("Country: " + d.country + "<br>Medals: " + d.medals + "<br>Population: " + d.population);
                tooltip.style("left", (event.pageX + 10) + "px")
                    .style("top", (event.pageY + 10) + "px");
            })
            .on("mouseout", () => d3.selectAll(".tooltip").remove());
    </script>
</body>

</html>
