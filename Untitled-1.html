<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Page Navigation</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth; /* Enables smooth scrolling */
        }
        nav {
            background-color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        nav .logo {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        nav ul li {
            margin: 0 0.5rem;
        }
        nav ul li a {
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: background 0.3s;
        }
        nav ul li a:hover {
            background: #575757;
        }
        section {
            height: 100vh;
            padding: 2rem;
        }
        #home {
            background: #f4f4f4;
        }
        #about {
            background: #ddd;
        }
        #services {
            background: #bbb;
        }
        #contact {
            background: #999;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <a href="#" class="logo">MySite</a>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Page Sections -->
    <section id="home">
        <h1>Home Section</h1>
        <p>Welcome to the Home section.</p>
    </section>
    <section id="about">
        <h1>About Section</h1>
        <p>This is the About section of the page.</p>
    </section>
    <section id="services">
        <h1>Services Section</h1>
        <p>Here are our Services.</p>
    </section>
    <section id="contact">
        <h1>Contact Section</h1>
        <p>Get in touch with us in the Contact section.</p>
    </section>
</body>
</html>
