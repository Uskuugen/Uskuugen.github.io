<!DOCTYPE html>
<meta charset="utf-8">

<!-- Load d3.js -->
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="http://d3js.org/d3.v4.js"></script>
<!-- Load color scale -->
<script src="https://d3js.org/d3-scale-chromatic.v1.min.js"></script>

<!-- Create a div where the graph will take place -->
<div id="my_dataviz"></div>

<script>
    // set the dimensions and margins of the graph
    var margin = {top: 10, right: 20, bottom: 30, left: 50},
        width = 500 - margin.left - margin.right,
        height = 420 - margin.top - margin.bottom;

    // append the svg object to the body of the page
    var svg = d3.select("#my_dataviz")
      .append("svg")
        .attr("width", width + margin.left + margin.right)
        .attr("height", height + margin.top + margin.bottom)
      .append("g")
        .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

    // Read the data (replace with your actual file or URL)
    d3.csv("https://raw.githubusercontent.com/Uskuugen/Uskuugen.github.io/refs/heads/main/Bubble.csv", function(data) {

        // Add X axis (show medals on the X-axis from 1 to 3000)
        var x = d3.scaleLinear()
          .domain([1, 3000])  // Medal range from 1 to 3000
          .range([0, width]);
        svg.append("g")
          .attr("transform", "translate(0," + height + ")")
          .call(d3.axisBottom(x));

        // Add Y axis (you can adjust this as per your data needs)
        var y = d3.scaleLinear()
          .domain([0, 1500000000])  // Population range, adjust this as needed
          .range([height, 0]);
        svg.append("g")
          .call(d3.axisLeft(y));

        // Add a scale for bubble size (adjusting for medal range)
        var z = d3.scaleLinear()
          .domain([1, 3000])  // Same range as medals
          .range([4, 40]);    // Bubble radius range (from 4 to 40 pixels)

        // Add a scale for bubble color based on continent
        var myColor = d3.scaleOrdinal()
          .domain(["Asia", "Europe", "Americas", "Africa", "Oceania"])
          .range(d3.schemeSet2);

        // Create tooltip for hovering over bubbles
        var tooltip = d3.select("#my_dataviz")
          .append("div")
            .style("opacity", 0)
            .attr("class", "tooltip")
            .style("background-color", "black")
            .style("border-radius", "5px")
            .style("padding", "10px")
            .style("color", "white");

        // Tooltip functions
        var showTooltip = function(d) {
          tooltip.transition().duration(200);
          tooltip.style("opacity", 1)
            .html("Country: " + d.country + "<br>Medals: " + d.medals + "<br>Population: " + d.population)
            .style("left", (d3.mouse(this)[0] + 30) + "px")
            .style("top", (d3.mouse(this)[1] + 30) + "px");
        };

        var moveTooltip = function(d) {
          tooltip.style("left", (d3.mouse(this)[0] + 30) + "px")
            .style("top", (d3.mouse(this)[1] + 30) + "px");
        };

        var hideTooltip = function(d) {
          tooltip.transition().duration(200)
            .style("opacity", 0);
        };

        // Add bubbles (using country, continent, and medals)
        var bubbles = svg.append('g')
          .selectAll("circle")
          .data(data)
          .enter()
          .append("circle")
          .attr("class", "bubbles")
          .attr("cx", function (d) { return x(d.medals); })  // Position X based on medals
          .attr("cy", function (d) { return y(d.population); })   // Position Y based on population
          .attr("r", function (d) { return z(d.medals); })     // Size based on medals
          .style("fill", function (d) { return myColor(d.continent); })  // Color based on continent
          .on("mouseover", showTooltip)
          .on("mousemove", moveTooltip)
          .on("mouseleave", hideTooltip);

    });
</script>
